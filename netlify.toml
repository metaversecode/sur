[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = ["views/**"]

# Static files (CSS, JS) served by Netlify CDN from /public
# All other routes handled by the Express serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
